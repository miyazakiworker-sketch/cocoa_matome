<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>だるい見積書・請求書 一瞬PDFジェネレーター｜COCOA TOOLS</title>

<meta name="description"
content="見積書・請求書を一瞬で作成。PDF保存・インボイス・源泉徴収・LocalStorage対応の無料ツール。">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0d0f12;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#e5e7eb;
padding:20px;

}

.container{

max-width:980px;
margin:auto;

}

h1{

font-size:2rem;
text-align:center;
margin-bottom:8px;
color:white;

}

.subtitle{

text-align:center;
color:#94a3b8;
margin-bottom:30px;

}

.panel{

background:#1a1f26;
border:1px solid #2d3748;
border-radius:18px;
padding:22px;
margin-bottom:24px;

}

.panel-title{

font-size:1.1rem;
font-weight:bold;
margin-bottom:18px;
color:#fff;

}

.row{

display:flex;
gap:16px;
margin-bottom:16px;
flex-wrap:wrap;

}

.group{

flex:1;
min-width:220px;

}

label{

display:block;
font-size:.85rem;
margin-bottom:6px;
color:#cbd5e1;

}

input,
textarea,
select{

width:100%;
padding:12px;
border-radius:12px;
border:1px solid #334155;
background:#111827;
color:white;
font-size:.95rem;

}

textarea{

resize:vertical;

}

.toggle{

display:flex;
gap:10px;

}

.toggle button{

flex:1;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
background:#374151;
color:white;
font-weight:bold;

transition:.2s;

}

.toggle button.active{

background:#a3e635;
color:#111827;

}

.item-row{

display:flex;
gap:10px;
margin-bottom:12px;
align-items:end;
flex-wrap:wrap;

}

.item-row input{

flex:1;

}

.small{

max-width:110px;

}

button{

cursor:pointer;

}

.main-btn{

background:#a3e635;
color:#111827;
border:none;
padding:14px;
border-radius:14px;
font-weight:bold;
font-size:15px;
transition:.2s;

}

.main-btn:hover{

transform:translateY(-2px);

}

.gray-btn{

background:#374151;
color:white;
border:none;
padding:14px;
border-radius:14px;
font-weight:bold;

}

.blue-btn{

background:#2563eb;
color:white;
border:none;
padding:14px;
border-radius:14px;
font-weight:bold;

}

.red-btn{

background:#dc2626;
color:white;
border:none;
padding:14px;
border-radius:14px;
font-weight:bold;

}

.button-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-top:20px;

}/* ===========================
   明細テーブル
=========================== */

#items{

margin-top:15px;

}

.item-row{

background:#111827;
border:1px solid #334155;
padding:14px;
border-radius:14px;

}

.item-row input{

margin-bottom:8px;

}

/* ===========================
   合計表示
=========================== */

.total-box{

margin-top:25px;
background:#111827;
border:1px solid #334155;
border-radius:16px;
padding:20px;

}

.total-line{

display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:16px;

}

.total-line:last-child{

margin-bottom:0;

}

.grand-total{

font-size:24px;
font-weight:bold;
color:#a3e635;

}

/* ===========================
   広告
=========================== */

.ad-box{

margin-top:35px;
padding:35px;
border:2px dashed #374151;
border-radius:16px;
text-align:center;
color:#94a3b8;

}

/* ===========================
   免責
=========================== */

.disclaimer{

margin-top:25px;
background:#111827;
border:1px solid #2d3748;
border-radius:14px;
padding:16px;
font-size:.82rem;
line-height:1.8;
color:#94a3b8;

}

/* ===========================
   フッター
=========================== */

footer{

margin-top:35px;
text-align:center;
color:#94a3b8;

}

footer a{

color:#60a5fa;
text-decoration:none;

}

/* ===========================
   印刷エリア
=========================== */

#printArea{

display:none;

}

@media print{

body{

background:white;
padding:0;

}

.container{

display:none;

}

#printArea{

display:block;

}

.a4{

width:210mm;
min-height:297mm;
padding:18mm;
background:white;
color:black;
font-size:13px;

}

.a4-title{

text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:28px;
letter-spacing:4px;

}

.a4-header{

display:flex;
justify-content:space-between;
margin-bottom:25px;

}

.a4-left{

width:48%;

}

.a4-right{

width:40%;
text-align:right;

}

.a4-company{

font-size:20px;
font-weight:bold;
border-bottom:2px solid black;
padding-bottom:5px;
margin-bottom:10px;

}

.a4-table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}

.a4-table th{

border:1px solid black;
background:#f3f4f6;
padding:8px;

}

.a4-table td{

border:1px solid black;
padding:8px;

}

.a4-total{

margin-top:25px;
margin-left:auto;
width:280px;

}

.a4-total table{

width:100%;
border-collapse:collapse;

}

.a4-total td{

border:1px solid black;
padding:8px;

}

.a4-note{

margin-top:40px;
border-top:1px solid black;
padding-top:15px;
font-size:12px;

}

}

@media(max-width:600px){

body{

padding:12px;

}

.panel{

padding:18px;

}

.button-grid{

grid-template-columns:1fr;

}

}
</style>
</head><body>

<div class="container">

<h1>📄 見積書・請求書 一瞬PDFジェネレーター</h1>

<p class="subtitle">
だるい書類作成を3秒で終わらせる。
</p>

<!-- ========================= -->
<!-- 基本情報 -->
<!-- ========================= -->

<div class="panel">

<div class="panel-title">
📋 基本情報
</div>

<div class="row">

<div class="group">
<label>書類種類</label>

<select id="docType">

<option value="請求書">請求書</option>

<option value="見積書">見積書</option>

</select>

</div>

<div class="group">
<label>書類番号</label>

<input
id="docNo"
type="text"
placeholder="INV-2026-001">

</div>

</div>

<div class="row">

<div class="group">

<label>発行日</label>

<input
id="issueDate"
type="date">

</div>

<div class="group">

<label>支払期限・有効期限</label>

<input
id="dueDate"
type="date">

</div>

</div>

</div>

<!-- ========================= -->
<!-- 宛先 -->
<!-- ========================= -->

<div class="panel">

<div class="panel-title">

🏢 宛先

</div>

<div class="row">

<div class="group">

<label>会社名・宛名</label>

<input
id="client"
type="text"
placeholder="株式会社○○ 御中">

</div>

</div>

<div class="row">

<div class="group">

<label>件名</label>

<input
id="subject"
type="text"
placeholder="ホームページ制作費">

</div>

</div>

</div>

<!-- ========================= -->
<!-- 発行者 -->
<!-- ========================= -->

<div class="panel">

<div class="panel-title">

👤 発行者情報

</div>

<div class="row">

<div class="group">

<label>会社名・氏名</label>

<input
id="myName"
type="text">

</div>

<div class="group">

<label>インボイス番号</label>

<input
id="invoiceNo"
type="text"
placeholder="T1234567890123">

</div>

</div>

<div class="row">

<div class="group">

<label>住所・電話番号</label>

<textarea
id="address"
rows="3"></textarea>

</div>

</div>

<div class="row">

<div class="group">

<label>振込先</label>

<textarea
id="bank"
rows="3"></textarea>

</div>

</div>

</div>

<!-- ========================= -->
<!-- 明細 -->
<!-- ========================= -->

<div class="panel">

<div class="panel-title">

🧾 明細

</div>

<div id="items">

</div>

<button
id="addItem"
class="gray-btn">

＋ 明細を追加

</button>

</div><!-- ========================= -->
<!-- オプション -->
<!-- ========================= -->

<div class="panel">

<div class="panel-title">
⚙️ オプション
</div>

<div class="toggle-row">

<label>
<input type="checkbox" id="useTax" checked>
消費税10%を計算
</label>

</div>

<div class="toggle-row">

<label>
<input type="checkbox" id="useGensen">
源泉徴収税を差し引く
</label>

</div>

</div>

<!-- ========================= -->
<!-- 合計 -->
<!-- ========================= -->

<div class="total-box">

<div class="total-line">
<span>小計</span>
<span id="subtotal">¥0</span>
</div>

<div class="total-line">
<span>消費税</span>
<span id="tax">¥0</span>
</div>

<div class="total-line">
<span>源泉徴収</span>
<span id="gensen">¥0</span>
</div>

<hr style="margin:15px 0;border-color:#334155;">

<div class="total-line grand-total">
<span>合計</span>
<span id="grandTotal">¥0</span>
</div>

</div>

<!-- ========================= -->
<!-- ボタン -->
<!-- ========================= -->

<div class="button-grid">

<button
class="green-btn"
id="pdfBtn">

📄 PDF出力

</button>

<button
class="blue-btn"
id="saveBtn">

💾 自動保存

</button>

<button
class="gray-btn"
id="clearBtn">

🗑 入力クリア

</button>

</div>

<!-- ========================= -->
<!-- 広告 -->
<!-- ========================= -->

<div class="ad-box">

広告スペース

</div>

<!-- ========================= -->
<!-- 免責 -->
<!-- ========================= -->

<div class="disclaimer">

本ツールはブラウザ内のみで動作します。<br>
入力内容はLocalStorageへ保存されます。<br>
PDF内容は必ずご自身で確認してください。

</div>

<footer>

<p>

開発：
<a href="https://x.com/cocoa_next7" target="_blank">

ココア (@cocoa_next7)

</a>

</p>

<p>

© COCOA TOOLS v2.0

</p>

</footer>

</div>

<!-- ========================= -->
<!-- 印刷専用A4 -->
<!-- ========================= -->

<div id="printArea"></div>

<script src="app.js"></script>

</body>
</html>
